name: B2 setup (CORS + healthcheck)

# One-off helper: runs on GitHub's infra (which can reach Backblaze B2),
# sets the bucket CORS rules needed for browser presigned uploads, and does a
# put/get/delete healthcheck to confirm the credentials work. Credentials are
# passed as inputs (not secrets) — rotate the key afterwards.

on:
  workflow_dispatch:
    inputs:
      key_id:
        description: 'B2 keyID'
        required: true
      app_key:
        description: 'B2 applicationKey'
        required: true
      bucket:
        description: 'B2 bucket name'
        required: true
      region:
        description: 'B2 region (e.g. us-east-005)'
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install boto3
      - name: Configure CORS + healthcheck
        env:
          B2_KEY_ID: ${{ github.event.inputs.key_id }}
          B2_APP_KEY: ${{ github.event.inputs.app_key }}
          B2_BUCKET: ${{ github.event.inputs.bucket }}
          B2_REGION: ${{ github.event.inputs.region }}
        run: |
          echo "::add-mask::$B2_KEY_ID"
          echo "::add-mask::$B2_APP_KEY"
          python3 - <<'PY'
          import os, boto3, urllib.request
          from botocore.config import Config
          region=os.environ['B2_REGION']; bucket=os.environ['B2_BUCKET']
          s3=boto3.client('s3',
            endpoint_url=f'https://s3.{region}.backblazeb2.com',
            aws_access_key_id=os.environ['B2_KEY_ID'],
            aws_secret_access_key=os.environ['B2_APP_KEY'],
            region_name=region, config=Config(signature_version='s3v4'))
          # CORS for browser presigned PUT/GET from the app origins
          s3.put_bucket_cors(Bucket=bucket, CORSConfiguration={'CORSRules':[{
            'AllowedOrigins':['https://proiav.space','https://www.proiav.space','http://localhost:3000'],
            'AllowedMethods':['GET','PUT','HEAD'],
            'AllowedHeaders':['*'],
            'ExposeHeaders':['ETag'],
            'MaxAgeSeconds':3600,
          }]})
          print('CORS set OK')
          # healthcheck: put / presigned get / delete
          s3.put_object(Bucket=bucket, Key='_healthcheck.txt', Body=b'ok')
          url=s3.generate_presigned_url('get_object', Params={'Bucket':bucket,'Key':'_healthcheck.txt'}, ExpiresIn=120)
          assert urllib.request.urlopen(url, timeout=20).read()==b'ok'
          s3.delete_object(Bucket=bucket, Key='_healthcheck.txt')
          print('Healthcheck OK — B2 credentials + bucket working')
          PY
