name: B2 setup (CORS + healthcheck)

# Runs on GitHub's infra (which can reach Backblaze). First validates the
# credentials with an S3 put/get/delete, then sets bucket CORS via B2's
# NATIVE API (the S3 API doesn't support PutBucketCors). Credentials are
# passed as inputs (not secrets) — rotate the key afterwards.

on:
  workflow_dispatch:
    inputs:
      key_id:
        description: 'B2 keyID'
        required: true
      app_key:
        description: 'B2 applicationKey'
        required: true
      bucket:
        description: 'B2 bucket name'
        required: true
      region:
        description: 'B2 region (e.g. us-east-005)'
        required: true
      bucket_id:
        description: 'B2 bucketId'
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install boto3
      - name: Validate creds (S3) + set CORS (native B2)
        env:
          B2_KEY_ID: ${{ github.event.inputs.key_id }}
          B2_APP_KEY: ${{ github.event.inputs.app_key }}
          B2_BUCKET: ${{ github.event.inputs.bucket }}
          B2_REGION: ${{ github.event.inputs.region }}
          B2_BUCKET_ID: ${{ github.event.inputs.bucket_id }}
        run: |
          echo "::add-mask::$B2_KEY_ID"
          echo "::add-mask::$B2_APP_KEY"
          python3 - <<'PY'
          import os, json, base64, urllib.request, boto3
          from botocore.config import Config
          kid=os.environ['B2_KEY_ID']; ak=os.environ['B2_APP_KEY']
          region=os.environ['B2_REGION']; bucket=os.environ['B2_BUCKET']; bid=os.environ['B2_BUCKET_ID']

          # 1) S3 healthcheck — proves the key/secret are valid
          s3=boto3.client('s3', endpoint_url=f'https://s3.{region}.backblazeb2.com',
            aws_access_key_id=kid, aws_secret_access_key=ak,
            region_name=region, config=Config(signature_version='s3v4'))
          s3.put_object(Bucket=bucket, Key='_healthcheck.txt', Body=b'ok')
          url=s3.generate_presigned_url('get_object', Params={'Bucket':bucket,'Key':'_healthcheck.txt'}, ExpiresIn=120)
          assert urllib.request.urlopen(url, timeout=20).read()==b'ok'
          s3.delete_object(Bucket=bucket, Key='_healthcheck.txt')
          print('S3 healthcheck OK — credentials valid')

          # 2) CORS via native B2 API
          areq=urllib.request.Request('https://api.backblazeb2.com/b2api/v3/b2_authorize_account',
            headers={'Authorization':'Basic '+base64.b64encode(f'{kid}:{ak}'.encode()).decode()})
          auth=json.load(urllib.request.urlopen(areq, timeout=20))
          api_url=auth['apiInfo']['storageApi']['apiUrl']
          account_id=auth['apiInfo']['storageApi']['accountId']
          token=auth['authorizationToken']
          cors=[{'corsRuleName':'browserUploads',
            'allowedOrigins':['https://proiav.space','https://www.proiav.space'],
            'allowedOperations':['s3_put','s3_get','s3_head'],
            'allowedHeaders':['*'],'exposeHeaders':['etag'],'maxAgeSeconds':3600}]
          ureq=urllib.request.Request(f'{api_url}/b2api/v3/b2_update_bucket',
            data=json.dumps({'accountId':account_id,'bucketId':bid,'corsRules':cors}).encode(),
            headers={'Authorization':token,'Content-Type':'application/json'})
          json.load(urllib.request.urlopen(ureq, timeout=20))
          print('CORS set OK (native B2) — B2 fully ready')
          PY
