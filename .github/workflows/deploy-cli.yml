name: Vercel production deploy (CLI)

# Self-contained production publish that does NOT depend on Vercel's git
# auto-deploy (which stopped firing for `main`). Runs on GitHub's infra,
# builds the checked-out `main`, and deploys the prebuilt output straight to
# production using a Vercel token stored in the VERCEL_TOKEN repo secret.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_Qve9hriFT9sNYnjWZolAcFXl
      VERCEL_PROJECT_ID: prj_izOgHHYR1pymhvKC1RXcrQY1aiUM
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull project settings and env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
