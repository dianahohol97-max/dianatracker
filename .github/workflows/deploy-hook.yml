name: Vercel production deploy (manual)

# Works around a broken Vercel auto-deploy trigger for `main`: this runs on
# GitHub's infrastructure (which can reach api.vercel.com) and POSTs a Vercel
# Deploy Hook, which builds the connected repo's production branch and
# publishes it. Trigger from the Actions tab or via the API (workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      hook_url:
        description: 'Vercel deploy hook URL (optional; falls back to the VERCEL_DEPLOY_HOOK secret)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          SECRET_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          INPUT_HOOK: ${{ github.event.inputs.hook_url }}
        run: |
          HOOK="${INPUT_HOOK:-$SECRET_HOOK}"
          if [ -z "$HOOK" ]; then
            echo "::error::No deploy hook URL. Add a repo secret VERCEL_DEPLOY_HOOK or pass the hook_url input."
            exit 1
          fi
          echo "Triggering Vercel deploy hook…"
          code=$(curl -sS -o resp.json -w "%{http_code}" -X POST "$HOOK")
          echo "HTTP $code"
          cat resp.json || true
          echo
          case "$code" in
            2*) echo "Deploy hook accepted — Vercel is building production.";;
            *)  echo "::error::Deploy hook returned HTTP $code"; exit 1;;
          esac
